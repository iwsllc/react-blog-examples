name: "@iwsio/react-blog-examples: PUSH to main"

on:
  push:
    branches: [ main ]

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  tests:
    if: ${{ !contains(github.event.head_commit.message, '#skip') }}
    uses: iwsllc/workflows/.github/workflows/test.yaml@v5
    with:
      registry-url: 'https://registry.npmjs.org'
      scope: '@iwsio'
      cache: pnpm
      use-pnpm: true
      node-version-file: '.nvmrc'
      install-command: pnpm install
      test-command: pnpm -F react-blog-examples test
  version:
    needs: tests
    if: ${{ !contains(github.event.head_commit.message, '#skip') }}
    concurrency:
      group: 'versioning-automation'
      cancel-in-progress: false
    uses: iwsllc/workflows/.github/workflows/version-as-app.yaml@main
    with:
      ref: main
      use-pnpm: true
      cache: pnpm
      node-version-file: '.nvmrc'
      scope: '@iwsio'
      version-command: npm version patch --workspaces --include-workspace-root --no-git-tag-version || true
    secrets:
      IWS_VERSION_BOT_PK: ${{ secrets.IWS_VERSION_BOT_PK}}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
  publish:
    needs: version
    if: ${{ !contains(github.event.head_commit.message, '#skip') }}
    uses: iwsllc/workflows/.github/workflows/publish.yaml@v5
    with:
      ref: main
      registry-url: 'https://registry.npmjs.org'
      cache: pnpm
      use-pnpm: true
      node-version-file: '.nvmrc'
      skip-node-auth: true
      scope: '@iwsio'
      install-command: pnpm install
      build-command: pnpm -F react-blog-examples build
      publish-command: pnpm -F react-blog-examples publish --access public
    secrets:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
